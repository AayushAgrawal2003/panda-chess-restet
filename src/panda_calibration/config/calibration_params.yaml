# ── ArUco markers ──
aruco_dict: "DICT_5X5_100"    # OpenCV ArUco dictionary name
marker_size: 0.05             # meters (5 cm)
marker_id_left: 0             # left marker when facing robot
marker_id_right: 1            # right marker when facing robot

# ── Camera topics ──
image_topic: /camera/color/image_raw
camera_info_topic: /camera/color/camera_info

# ── TF frames ──
base_frame: panda_link0
ee_frame: panda_EE            # or panda_hand, depends on your URDF

# ── Calibration ──
min_samples: 8                # minimum samples before solve is allowed
method: TSAI                  # TSAI, PARK, HORAUD, ANDREFF, DANIILIDIS

# ── Output ──
output_file: calibration_result.yaml
